#TMSH-VERSION: 17.1.3
gtm datacenter /Common/dc_nyc {
    contact "netops@example.com"
    location "New York"
}
gtm datacenter /Common/dc_sjc {
    contact "netops@example.com"
    location "San Jose"
}
gtm monitor https /Common/gtm_mon_https_app1 {
    cipherlist DEFAULT
    defaults-from /Common/https
    destination *:*
    interval 30
    probe-timeout 5
    recv "200 OK"
    send "GET /healthz HTTP/1.1\r\nHost: app1.example.com\r\n\r\n"
    timeout 120
}
gtm server /Common/bigip_nyc {
    datacenter /Common/dc_nyc
    devices {
        bigip-nyc-01 {
            addresses {
                198.51.100.10 { }
            }
        }
    }
    monitor /Common/bigip
    product bigip
    virtual-servers {
        /Common/vs_app1_https {
            destination 192.0.2.10:443
        }
        /Common/vs_api_tls {
            destination 192.0.2.20:8443
        }
    }
}
gtm server /Common/bigip_sjc {
    datacenter /Common/dc_sjc
    devices {
        bigip-sjc-01 {
            addresses {
                198.51.100.20 { }
            }
        }
    }
    monitor /Common/bigip
    product bigip
    virtual-servers {
        /Common/vs_app1_sjc {
            destination 203.0.113.10:443
        }
    }
}
gtm pool a /Common/gpool_app1 {
    alternate-mode round-robin
    fallback-mode return-to-dns
    load-balancing-mode topology
    members {
        /Common/bigip_nyc:/Common/vs_app1_https {
            member-order 0
        }
        /Common/bigip_sjc:/Common/vs_app1_sjc {
            member-order 1
        }
    }
    monitor /Common/gtm_mon_https_app1
    ttl 30
    verify-member-availability enabled
}
gtm pool a /Common/gpool_api {
    load-balancing-mode global-availability
    members {
        /Common/bigip_nyc:/Common/vs_api_tls {
            member-order 0
        }
    }
    ttl 30
}
gtm wideip a /Common/app1.gslb.example.com {
    description "App1 GSLB"
    pool-lb-mode round-robin
    pools {
        /Common/gpool_app1 {
            order 0
        }
    }
    persistence enabled
    persist-cidr-ipv4 24
    ttl-persistence 3600
}
gtm wideip a /Common/api.gslb.example.com {
    pool-lb-mode global-availability
    pools {
        /Common/gpool_api {
            order 0
        }
    }
}
gtm wideip aaaa /Common/app1-v6.gslb.example.com {
    pool-lb-mode round-robin
    pools-cname {
    }
    pools {
        /Common/gpool_app1 {
            order 0
        }
    }
}
gtm region /Common/region_east {
    region-members {
        subnet 10.0.0.0/8 { }
    }
}
gtm topology ldns: subnet 10.0.0.0/8 server: datacenter /Common/dc_nyc {
    order 1
    score 100
}
gtm global-settings load-balancing {
    topology-longest-match yes
}
gtm listener /Common/gtm_listener_53 {
    address 192.0.2.53
    ip-protocol udp
    mask 255.255.255.255
    port 53
    profiles {
        /Common/dns { }
        /Common/udp_gtm_dns { }
    }
    translate-address disabled
    translate-port disabled
}
gtm dns dnssec zone /Common/dnssec_gslb_example_com {
    keys {
        /Common/zsk_gslb {
            key-type zsk
        }
        /Common/ksk_gslb {
            key-type ksk
        }
    }
}
gtm dns dnssec key /Common/zsk_gslb {
    algorithm rsasha256
    bit-width 2048
    key-type zsk
    rollover-period 2592000
    ttl 86400
}
gtm dns dnssec key /Common/ksk_gslb {
    algorithm rsasha256
    bit-width 4096
    key-type ksk
    rollover-period 31536000
    ttl 86400
}
