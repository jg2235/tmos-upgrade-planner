#TMSH-VERSION: 17.1.3
apm profile access /Common/ap_corp_sso {
    accept-languages { en }
    access-policy /Common/ap_corp_sso_policy
    app-service none
    default-language en
    type all
}
asm policy /Common/asm_app1_policy {
    active
    blocking-mode enabled
    encoding utf-8
    policy-builder enabled
}
ltm default-node-monitor {
    rule /Common/icmp
}
ltm node /Common/10.10.20.11 {
    address 10.10.20.11
}
ltm node /Common/10.10.20.12 {
    address 10.10.20.12
}
ltm node /Common/10.10.30.21 {
    address 10.10.30.21
}
ltm node /Common/10.10.30.22 {
    address 10.10.30.22
}
ltm monitor http /Common/mon_http_app1 {
    adaptive disabled
    defaults-from /Common/http
    destination *:*
    interval 5
    recv "200 OK"
    send "GET /healthz HTTP/1.1\r\nHost: app1.example.com\r\nConnection: Close\r\n\r\n"
    time-until-up 0
    timeout 16
}
ltm monitor https /Common/mon_https_api {
    adaptive disabled
    cipherlist DEFAULT
    defaults-from /Common/https
    destination *:*
    interval 5
    recv "\"status\":\"up\""
    send "GET /api/health HTTP/1.1\r\nHost: api.example.com\r\nConnection: Close\r\n\r\n"
    ssl-profile /Common/serverssl
    timeout 16
}
ltm pool /Common/pool_app1_http {
    load-balancing-mode least-connections-member
    members {
        /Common/10.10.20.11:8080 {
            address 10.10.20.11
        }
        /Common/10.10.20.12:8080 {
            address 10.10.20.12
        }
    }
    monitor /Common/mon_http_app1
    service-down-action reset
    slow-ramp-time 30
}
ltm pool /Common/pool_api_tls {
    load-balancing-mode round-robin
    members {
        /Common/10.10.30.21:8443 {
            address 10.10.30.21
        }
        /Common/10.10.30.22:8443 {
            address 10.10.30.22
        }
    }
    monitor /Common/mon_https_api
}
ltm policy /Common/pol_l7_routing {
    controls { forwarding }
    requires { http }
    rules {
        api_route {
            actions {
                0 {
                    forward
                    select
                    pool /Common/pool_api_tls
                }
            }
            conditions {
                0 {
                    http-uri
                    path
                    starts-with
                    values { /api/ }
                }
            }
            ordinal 1
        }
    }
    status published
    strategy /Common/first-match
}
ltm profile client-ssl /Common/cssl_app1 {
    app-service none
    cert-key-chain {
        app1_ecdsa {
            cert /Common/app1.example.com.crt
            key /Common/app1.example.com.key
            chain /Common/intermediate-ca.crt
        }
    }
    cipher-group /Common/cg_modern
    ciphers none
    defaults-from /Common/clientssl
    options { no-tlsv1 no-tlsv1.1 no-sslv3 }
    ocsp-stapling enabled
    renegotiation disabled
    secure-renegotiation require
    session-ticket enabled
}
ltm profile server-ssl /Common/sssl_api {
    app-service none
    cipher-group /Common/cg_modern
    ciphers none
    defaults-from /Common/serverssl
    options { no-tlsv1 no-tlsv1.1 no-sslv3 }
    peer-cert-mode require
    server-name api.example.com
    trusted-ca-bundle /Common/ca-bundle.crt
}
ltm profile http /Common/http_xff {
    app-service none
    defaults-from /Common/http
    enforcement {
        max-header-count 64
        max-header-size 32768
        unknown-method allow
    }
    hsts {
        include-subdomains enabled
        mode enabled
        maximum-age 31536000
    }
    insert-xforwarded-for enabled
    proxy-type reverse
}
ltm profile http2 /Common/http2_app1 {
    activation-modes { alpn }
    app-service none
    concurrent-streams-per-connection 32
    defaults-from /Common/http2
    frame-size 2048
    insert-header disabled
}
ltm profile one-connect /Common/oc_app1 {
    app-service none
    defaults-from /Common/oneconnect
    idle-timeout-override 60
    max-reuse 250
    max-size 10000
    source-mask 255.255.255.255
}
ltm profile tcp /Common/tcp_wan_opt {
    app-service none
    congestion-control bbr
    defaults-from /Common/tcp-wan-optimized
    idle-timeout 300
    nagle disabled
}
ltm profile websocket /Common/ws_app1 {
    app-service none
    defaults-from /Common/websocket
    masking preserve
}
ltm persistence cookie /Common/pers_cookie_app1 {
    app-service none
    cookie-encryption required
    cookie-encryption-passphrase $M$encrypted$
    cookie-name BIGipApp1
    defaults-from /Common/cookie
    expiration 0
    method insert
}
ltm persistence source-addr /Common/pers_src_api {
    app-service none
    defaults-from /Common/source_addr
    timeout 300
}
ltm rule /Common/irule_redirect_http {
    when HTTP_REQUEST {
        if { [HTTP::uri] starts_with "/legacy" } {
            HTTP::respond 301 Location "https://[HTTP::host]/app[HTTP::uri]"
        } else {
            HTTP::header insert X-Request-ID [TMM::cmp_unit][clock clicks]
        }
    }
}
ltm rule /Common/irule_dns_logging {
    when DNS_REQUEST {
        log local0. "DNS query [DNS::question name] type [DNS::question type] from [IP::client_addr]"
    }
}
ltm snatpool /Common/snat_app1 {
    members {
        /Common/10.10.99.5
        /Common/10.10.99.6
    }
}
ltm virtual /Common/vs_app1_https {
    creation-time 2025-01-15:10:00:00
    description "App1 production HTTPS"
    destination /Common/192.0.2.10:443
    ip-protocol tcp
    last-modified-time 2025-06-01:09:30:00
    mask 255.255.255.255
    persist {
        /Common/pers_cookie_app1 {
            default yes
        }
    }
    policies {
        /Common/pol_l7_routing { }
    }
    pool /Common/pool_app1_http
    profiles {
        /Common/cssl_app1 {
            context clientside
        }
        /Common/http2_app1 { }
        /Common/http_xff { }
        /Common/oc_app1 { }
        /Common/tcp_wan_opt { }
        /Common/ws_app1 { }
    }
    rules {
        /Common/irule_redirect_http
    }
    security-log-profiles {
        "/Common/Log all requests"
    }
    source 0.0.0.0/0
    source-address-translation {
        pool /Common/snat_app1
        type snat
    }
    translate-address enabled
    translate-port enabled
    vs-index 2
}
ltm virtual /Common/vs_api_tls {
    description "API gateway mTLS"
    destination /Common/192.0.2.20:8443
    ip-protocol tcp
    mask 255.255.255.255
    per-flow-request-access-policy /Common/ap_corp_sso_policy
    persist {
        /Common/pers_src_api {
            default yes
        }
    }
    pool /Common/pool_api_tls
    profiles {
        /Common/ap_corp_sso { }
        /Common/cssl_app1 {
            context clientside
        }
        /Common/sssl_api {
            context serverside
        }
        /Common/http_xff { }
    }
    source 0.0.0.0/0
    source-address-translation {
        type automap
    }
    translate-address enabled
    translate-port enabled
    vs-index 3
}
ltm virtual /Common/vs_dns_udp {
    description "DNS listener helper VS"
    destination /Common/192.0.2.53:53
    ip-protocol udp
    mask 255.255.255.255
    profiles {
        /Common/dns_ltm { }
        /Common/udp_gtm_dns { }
    }
    rules {
        /Common/irule_dns_logging
    }
    source 0.0.0.0/0
    translate-address enabled
    translate-port enabled
    vs-index 4
}
ltm profile dns /Common/dns_ltm {
    app-service none
    defaults-from /Common/dns
    dns64 disabled
    enable-cache yes
    enable-dns-express yes
    enable-dnssec yes
    enable-gtm yes
    enable-rapid-response no
    process-rd yes
    unhandled-query-action allow
    use-local-bind yes
}
security firewall policy /Common/fw_pol_app1 {
    rules {
        allow_web {
            action accept
            ip-protocol tcp
            destination {
                ports {
                    443 { }
                }
            }
            place-after first
        }
        drop_all {
            action drop
            place-after last
        }
    }
}
security bot-defense profile /Common/bd_app1 {
    app-service none
    defaults-from /Common/bot-defense
    enforcement-mode blocking
    template strict
}
